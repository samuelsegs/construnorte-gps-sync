name: GPS Sync Ovisión

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Sync GPS → Firestore
        run: node sync.cjs
        env:
          OVIS_LOGIN: ${{ secrets.OVIS_LOGIN }}
          OVIS_PASSWORD: ${{ secrets.OVIS_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
